version: '3.8'

services:
  lb:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend1
      - backend2
      - backend3

  # Nodes
  backend1:
    image: traefik/whoami
    hostname: backend1

  backend2:
    image: traefik/whoami
    hostname: backend2

  backend3:
    image: traefik/whoami
    hostname: backend3

  # Observability
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus